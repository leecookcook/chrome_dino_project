<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>브라키오 사가: 최종 업데이트</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        :root { --bg-color: #f7f7f7; --main-color: #535353; --sub-color: #747474; }
        body.night-mode { --bg-color: #0b0b1a; --main-color: #ffffff; --sub-color: #aaaaaa; }
        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; transition: background-color 0.5s; }
        #game { position: relative; width: 600px; height: 150px; background-color: var(--bg-color); overflow: hidden; border-bottom: 2px solid var(--main-color); touch-action: none; }

        /* 밤하늘 요소 */
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        #moon { display: none; position: absolute; top: 10px; right: 50px; width: 30px; height: 30px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px #fff; }
        .night-mode #moon { display: block; }

        /* 디자인 요소들 */
        #score-area { position: absolute; top: 10px; right: 10px; color: var(--main-color); font-weight: bold; }
        #dino { position: absolute; left: 40px; bottom: 2px; width: 4px; height: 4px; background: transparent; z-index: 5; }
        .gun { display: none; position: absolute; width: 14px; height: 6px; background: #ff4500; bottom: 12px; left: 32px; z-index: 6; }
        .armed .gun { display: block; }
        .bullet { position: absolute; width: 6px; height: 3px; background: #ff0; z-index: 6; }

        /* 공룡들 */
        .stand-a { box-shadow: 36px -32px 0 var(--main-color), 40px -32px 0 var(--main-color), 36px -28px 0 var(--main-color), 32px -16px 0 var(--main-color), 28px -12px 0 var(--main-color), 12px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 24px 0px 0 var(--main-color); }
        .stand-b { box-shadow: 36px -32px 0 var(--main-color), 40px -32px 0 var(--main-color), 36px -28px 0 var(--main-color), 32px -16px 0 var(--main-color), 28px -12px 0 var(--main-color), 12px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 12px 4px 0 var(--main-color); }
        .duck-a { box-shadow: 12px -8px 0 var(--main-color), 36px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 32px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 28px 0px 0 var(--main-color), 8px 4px 0 var(--main-color), 24px 4px 0 var(--main-color); }
        
        /* 1. 메테오 및 2. 프테라노돈 */
        .meteor { position: absolute; width: 12px; height: 12px; background: #ff4500; border-radius: 50%; box-shadow: 0 0 10px #ff4500; z-index: 6; }
        .ptera { width: 30px; height: 20px; background: var(--main-color); clip-path: polygon(0 50%, 100% 0, 80% 50%, 100% 100%); z-index: 4; }
        
        /* 4. 보스 */
        .trex { position: absolute; width: 40px; height: 40px; background: var(--main-color); clip-path: polygon(0 100%, 20% 60%, 40% 60%, 60% 0, 100% 100%); z-index: 10; }
        
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); color: white; display: none; z-index: 100; }
    </style>
</head>
<body>

<div id="game">
    <div id="moon"></div>
    <div id="score-area"><span id="score">00000</span></div>
    <div id="dino" class="stand-a"><div class="gun"></div></div>
    <div id="obstacles"></div>
    <div class="overlay" id="msg-gameover" style="display:flex;">GAME OVER - 터치하여 재시작</div>
</div>

<script>
    const game = document.getElementById('game');
    const dino = document.getElementById('dino');
    let isPlaying = false, score = 0, trex = null;
    let dinoY = 0, isJumping = false, isDucking = false;

    function startGame() {
        if(isPlaying) return;
        isPlaying = true;
        score = 0; trex = null;
        document.getElementById('msg-gameover').style.display = 'none';
        document.querySelectorAll('.obstacle, .meteor, .bullet, .trex').forEach(el => el.remove());
        requestAnimationFrame(update);
    }

    function update() {
        if(!isPlaying) return;
        score++;
        document.getElementById('score').innerText = String(score).padStart(5, '0');
        
        // 배경 모드
        if(score % 500 === 0) document.body.classList.toggle('night-mode');

        // 메테오 스폰 (우측 끝 상단)
        if(Math.random() < 0.01) createMeteor();
        
        // 4. 보스 생성 (반대편 끝에서)
        if(score === 1000 && !trex) createTrex();

        requestAnimationFrame(update);
    }

    function createMeteor() {
        const m = document.createElement('div');
        m.className = 'meteor';
        let x = 600, y = 0;
        m.style.left = x + 'px';
        m.style.top = y + 'px';
        game.appendChild(m);
        
        let timer = setInterval(() => {
            x -= 5; y += 2;
            m.style.left = x + 'px'; m.style.top = y + 'px';
            // 충돌 감지 로직 (점프로 회피 가능)
            if(x < 80 && x > 40 && y > 100 - (isJumping ? 50 : 0)) endGame();
            if(x < -20) { m.remove(); clearInterval(timer); }
        }, 30);
    }

    function createTrex() {
        trex = { hp: 10, x: 600, el: document.createElement('div') };
        trex.el.className = 'trex';
        trex.el.style.left = '600px';
        trex.el.style.bottom = '2px';
        game.appendChild(trex.el);
        // 이동 로직 추가...
    }

    function endGame() {
        isPlaying = false;
        document.getElementById('msg-gameover').style.display = 'flex';
    }

    game.addEventListener('touchstart', startGame);
    window.addEventListener('keydown', (e) => {
        if(e.code === 'Space') startGame();
        if(e.code === 'ArrowDown') isDucking = true;
    });
    window.addEventListener('keyup', (e) => {
        if(e.code === 'ArrowDown') isDucking = false;
    });
</script>
</body>
</html>
