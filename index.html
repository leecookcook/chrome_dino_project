<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크롬 스타일 브라키오 게임 - 달리기 애니메이션</title>
    <style>
        /* 기본 스타일 및 픽셀 아트 정의 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }

        :root { --bg-color: #f7f7f7; --main-color: #535353; --sub-color: #747474; }
        body.night-mode { --bg-color: #202124; --main-color: #e8eaed; --sub-color: #9aa0a6; }

        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none; transition: background-color 0.3s ease; }
        #game { position: relative; width: 600px; height: 150px; background-color: var(--bg-color); overflow: hidden; border-bottom: 2px solid var(--main-color); transition: background-color 0.3s ease, border-color 0.3s ease; }

        /* 점수 영역 */
        #score-area { position: absolute; top: 10px; right: 10px; color: var(--main-color); font-size: 18px; font-weight: bold; z-index: 10; }
        #hi-score { margin-right: 15px; color: var(--sub-color); }

        /* 배경 구름 */
        .cloud { position: absolute; width: 4px; height: 4px; background: transparent; box-shadow: 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 4px 4px 0 var(--main-color), 8px 4px 0 var(--main-color), 12px 4px 0 var(--main-color), 16px 4px 0 var(--main-color), 20px 4px 0 var(--main-color), 24px 4px 0 var(--main-color), 28px 4px 0 var(--main-color), 0px 8px 0 var(--main-color), 4px 8px 0 var(--main-color), 8px 8px 0 var(--main-color), 12px 8px 0 var(--main-color), 16px 8px 0 var(--main-color), 20px 8px 0 var(--main-color), 24px 8px 0 var(--main-color), 8px 12px 0 var(--main-color), 12px 12px 0 var(--main-color); opacity: 0.6; z-index: 1; }

        /* 공룡 공통 베이스 (몸통, 목, 머리 공통 픽셀) */
        #dino { position: absolute; left: 40px; bottom: 2px; width: 4px; height: 4px; background: transparent; transition: bottom 0s; z-index: 5; }

        /* --- [수정사항] 공룡 다리 구동 애니메이션 픽셀 아트 --- */
        
        /* 1. 서 있을 때 (기본형 - 양발 다 있음) */
        #dino.stand { box-shadow: 36px -32px 0 var(--main-color), 40px -32px 0 var(--main-color), 44px -32px 0 var(--main-color), 36px -28px 0 var(--main-color), 40px -28px 0 var(--main-color), 36px -24px 0 var(--main-color), 36px -20px 0 var(--main-color), 32px -16px 0 var(--main-color), 36px -16px 0 var(--main-color), 28px -12px 0 var(--main-color), 32px -12px 0 var(--main-color), 12px -8px 0 var(--main-color), 16px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 24px -8px 0 var(--main-color), 28px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 12px -4px 0 var(--main-color), 16px -4px 0 var(--main-color), 20px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 28px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 8px 0px 0 var(--main-color), 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 24px 0px 0 var(--main-color), 8px 4px 0 var(--main-color), 24px 4px 0 var(--main-color); }

        /* 2. 달리기 프레임 A (왼발만 바닥에 딛고 오른발은 들려있음) */
        #dino.run-a { box-shadow: 36px -32px 0 var(--main-color), 40px -32px 0 var(--main-color), 44px -32px 0 var(--main-color), 36px -28px 0 var(--main-color), 40px -28px 0 var(--main-color), 36px -24px 0 var(--main-color), 36px -20px 0 var(--main-color), 32px -16px 0 var(--main-color), 36px -16px 0 var(--main-color), 28px -12px 0 var(--main-color), 32px -12px 0 var(--main-color), 12px -8px 0 var(--main-color), 16px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 24px -8px 0 var(--main-color), 28px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 12px -4px 0 var(--main-color), 16px -4px 0 var(--main-color), 20px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 28px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 8px 0px 0 var(--main-color), 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 24px 0px 0 var(--main-color), 8px 4px 0 var(--main-color); }

        /* 3. 달리기 프레임 B (오른발만 바닥에 딛고 왼발은 들려있음) */
        #dino.run-b { box-shadow: 36px -32px 0 var(--main-color), 40px -32px 0 var(--main-color), 44px -32px 0 var(--main-color), 36px -28px 0 var(--main-color), 40px -28px 0 var(--main-color), 36px -24px 0 var(--main-color), 36px -20px 0 var(--main-color), 32px -16px 0 var(--main-color), 36px -16px 0 var(--main-color), 28px -12px 0 var(--main-color), 32px -12px 0 var(--main-color), 12px -8px 0 var(--main-color), 16px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 24px -8px 0 var(--main-color), 28px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 12px -4px 0 var(--main-color), 16px -4px 0 var(--main-color), 20px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 28px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 8px 0px 0 var(--main-color), 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 24px 0px 0 var(--main-color), 24px 4px 0 var(--main-color); }

        /* 4. 숙이기 프레임 A (몸을 낮추고 왼발 딛기) */
        #dino.duck-a { box-shadow: 12px -8px 0 var(--main-color), 16px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 24px -8px 0 var(--main-color), 28px -8px 0 var(--main-color), 32px -8px 0 var(--main-color), 36px -8px 0 var(--main-color), 40px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 12px -4px 0 var(--main-color), 16px -4px 0 var(--main-color), 20px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 28px -4px 0 var(--main-color), 32px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 8px 0px 0 var(--main-color), 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 24px 0px 0 var(--main-color), 28px 0px 0 var(--main-color), 8px 4px 0 var(--main-color); }

        /* 5. 숙이기 프레임 B (몸을 낮추고 오른발 딛기) */
        #dino.duck-b { box-shadow: 12px -8px 0 var(--main-color), 16px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 24px -8px 0 var(--main-color), 28px -8px 0 var(--main-color), 32px -8px 0 var(--main-color), 36px -8px 0 var(--main-color), 40px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 12px -4px 0 var(--main-color), 16px -4px 0 var(--main-color), 20px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 28px -4px 0 var(--main-color), 32px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 8px 0px 0 var(--main-color), 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 24px 0px 0 var(--main-color), 28px 0px 0 var(--main-color), 24px 4px 0 var(--main-color); }

        /* 장애물 구조 */
        .obstacle { position: absolute; background: transparent; z-index: 4; }
        .cactus { bottom: 2px; width: 4px; height: 4px; box-shadow: 8px -24px 0 var(--main-color), 8px -20px 0 var(--main-color), 0px -16px 0 var(--main-color), 8px -16px 0 var(--main-color), 16px -16px 0 var(--main-color), 0px -12px 0 var(--main-color), 8px -12px 0 var(--main-color), 16px -12px 0 var(--main-color), 0px -8px 0 var(--main-color), 8px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 8px 0px 0 var(--main-color); }
        .ptera { width: 4px; height: 4px; box-shadow: 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 8px 4px 0 var(--main-color), 12px 4px 0 var(--main-color), 16px 4px 0 var(--main-color), 20px 4px 0 var(--main-color), 24px 4px 0 var(--main-color), 0px 8px 0 var(--main-color), 4px 8px 0 var(--main-color), 8px 8px 0 var(--main-color), 12px 8px 0 var(--main-color), 16px 8px 0 var(--main-color), 20px 8px 0 var(--main-color), 8px 12px 0 var(--main-color), 12px 12px 0 var(--main-color), 16px 12px 0 var(--main-color); }

        /* 오버레이 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--main-color); font-size: 16px; font-weight: bold; background-color: var(--bg-color); z-index: 20; }
        .msg-gameover { display: none; }
        .gameover-text { font-size: 24px; letter-spacing: 5px; margin-bottom: 10px; }
        .restart-text { font-size: 14px; color: var(--sub-color); }
    </style>
</head>
<body>

<div id="game">
    <div id="clouds"></div>
    <div id="score-area">
        <span id="hi-score">HI 00000</span>
        <span id="score">00000</span>
    </div>
    <div id="dino" class="stand"></div>
    <div id="obstacles"></div>
    <div class="overlay msg-start" id="msg-start">
        <p>Space / ↑: 점프, ↓: 숙이기</p>
        <p style="font-size: 12px; margin-top: 5px;">(시작하려면 Space / ↑)</p>
    </div>
    <div class="overlay msg-gameover" id="msg-gameover">
        <p class="gameover-text">GAME OVER</p>
        <p class="restart-text">Space / ↑ 키로 재시작</p>
    </div>
</div>

<script>
    const body = document.body;
    const dino = document.getElementById('dino');
    const scoreDisplay = document.getElementById('score');
    const hiScoreDisplay = document.getElementById('hi-score');
    const obstaclesContainer = document.getElementById('obstacles');
    const cloudsContainer = document.getElementById('clouds');
    const msgStart = document.getElementById('msg-start');
    const msgGameover = document.getElementById('msg-gameover');

    let isPlaying = false;
    let score = 0;
    let hiScore = 0;
    let scoreInterval;
    let gameLoopInterval;
    let isNight = false;
    
    let isJumping = false;
    let isDucking = false; 
    let dinoY = 0;
    let jumpVelocity = 0;
    const gravity = 0.6; 

    let obstacles = [];
    let clouds = [];
    let obstacleSpeed = 4; 
    const cloudSpeed = 1; 
    let spawnTimer = 0;
    let cloudSpawnTimer = 0;

    // [수정사항] 다리 달리기 애니메이션용 타이머 변수
    let legTimer = 0;
    let currentLegFrame = 'a'; // 'a' 또는 'b'

    // 키보드 입력 처리
    window.addEventListener('keydown', function(e) {
        if (!isPlaying) {
            if (e.code === 'Space' || e.code === 'ArrowUp') startGame();
            return;
        }

        if (e.code === 'Space' || e.code === 'ArrowUp') {
            e.preventDefault(); 
            if (!isJumping && !isDucking) { 
                isJumping = true;
                jumpVelocity = 10;
            }
        } else if (e.code === 'ArrowDown') {
            e.preventDefault();
            if (!isJumping && !isDucking) { 
                isDucking = true;
            }
        }
    });

    window.addEventListener('keyup', function(e) {
        if (e.code === 'ArrowDown') {
            e.preventDefault();
            if (isDucking) {
                isDucking = false;
            }
        }
    });

    function startGame() {
        isPlaying = true;
        score = 0;
        dinoY = 0;
        isJumping = false;
        isDucking = false; 
        jumpVelocity = 0;
        obstacles = [];
        clouds = [];
        spawnTimer = 0;
        cloudSpawnTimer = 0;
        legTimer = 0;
        isNight = false;
        obstacleSpeed = 4; 

        obstaclesContainer.innerHTML = '';
        cloudsContainer.innerHTML = '';
        body.classList.remove('night-mode');
        msgStart.style.display = 'none';
        msgGameover.style.display = 'none';
        scoreDisplay.innerText = '00000';

        // 0.05초마다 점수 증가
        clearInterval(scoreInterval);
        scoreInterval = setInterval(() => {
            if (!isPlaying) return;
            score++;
            scoreDisplay.innerText = String(score).padStart(5, '0');

            if (score > 0 && score % 600 === 0) {
                toggleNightMode();
            }
        }, 50);

        clearInterval(gameLoopInterval);
        gameLoopInterval = setInterval(updateGame, 1000 / 60);
    }

    function toggleNightMode() {
        isNight = !isNight;
        if (isNight) body.classList.add('night-mode');
        else body.classList.remove('night-mode');
        obstacleSpeed += 2; // 난이도 업
    }

    function updateGame() {
        if (!isPlaying) return;

        // --- 공룡 점프 및 물리 연산 ---
        if (isJumping) {
            dinoY += jumpVelocity;
            jumpVelocity -= gravity; 

            if (dinoY <= 0) {
                dinoY = 0;
                isJumping = false;
                jumpVelocity = 0;
            }
        }
        dino.style.bottom = (2 + dinoY) + 'px';

        // --- [수정사항] 달리기 다리 애니메이션 연산 (60프레임 루프 내부) ---
        legTimer++;
        if (legTimer > 6) { // 숫자가 낮을수록 다리를 더 빨리 움직입니다 (6프레임=0.1초 마다 전환)
            currentLegFrame = (currentLegFrame === 'a') ? 'b' : 'a';
            legTimer = 0;
        }

        // 상태별 클래스 교체 실시간 업데이트
        dino.className = ''; // 클래스 전체 리셋
        if (isJumping) {
            dino.classList.add('stand'); // 공중에 떠 있을 때는 다리를 모으고 정지
        } else if (isDucking) {
            dino.classList.add(currentLegFrame === 'a' ? 'duck-a' : 'duck-b'); // 숙여서 달리기
        } else {
            dino.classList.add(currentLegFrame === 'a' ? 'run-a' : 'run-b'); // 서서 달리기
        }

        // 배경 구름 제어
        cloudSpawnTimer++;
        if (cloudSpawnTimer > Math.random() * 100 + 150) {
            createCloud();
            cloudSpawnTimer = 0;
        }
        for (let i = clouds.length - 1; i >= 0; i--) {
            let cloud = clouds[i];
            cloud.x -= cloudSpeed;
            cloud.el.style.left = cloud.x + 'px';
            if (cloud.x < -40) { cloud.el.remove(); clouds.splice(i, 1); }
        }

        // 장애물 생성 간격 계산
        spawnTimer++;
        const minSpawnInterval = (40 * 2) / obstacleSpeed * 60;
        const maxSpawnInterval = (40 * 5) / obstacleSpeed * 60;
        const spawnInterval = Math.random() * (maxSpawnInterval - minSpawnInterval) + minSpawnInterval;

        if (spawnTimer > spawnInterval) { 
            if (isNight && Math.random() > 0.5) {
                createPtera();
            } else {
                const numCactus = Math.random() > 0.5 ? 1 : 2;
                createCactus(numCactus);
            }
            spawnTimer = 0;
        }

        // 장애물 이동 및 충돌 체크
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.x -= obstacleSpeed;
            obs.el.style.left = obs.x + 'px';

            if (obs.x < -40) { obs.el.remove(); obstacles.splice(i, 1); continue; }

            // 충돌 감지 박스 (숙이기 유무 반영)
            let dinoLeft = 40 + (isDucking ? 4 : 12);
            let dinoRight = 40 + (isDucking ? 40 : 32);
            let dinoBottom = dinoY;
            let dinoTop = dinoY + (isDucking ? 8 : 16);

            let obsLeft = obs.x + obs.hitbox.left;
            let obsRight = obs.x + obs.hitbox.right;
            let obsBottom = obs.hitbox.bottom;
            let obsTop = obs.hitbox.top;

            if (obsLeft < dinoRight && obsRight > dinoLeft && dinoBottom < obsTop && dinoTop > obsBottom) {
                endGame();
            }
        }
    }

    function createCloud() {
        const cloudEl = document.createElement('div');
        cloudEl.classList.add('cloud');
        cloudEl.style.left = '600px';
        cloudEl.style.top = (Math.random() * 60 + 20) + 'px'; 
        cloudsContainer.appendChild(cloudEl);
        clouds.push({ el: cloudEl, x: 600 });
    }

    function createCactus(num) {
        for (let i = 0; i < num; i++) {
            const obsEl = document.createElement('div');
            obsEl.classList.add('obstacle', 'cactus');
            const startX = 600 + (i * 20); 
            obsEl.style.left = startX + 'px';
            obstaclesContainer.appendChild(obsEl);
            obstacles.push({ el: obsEl, x: startX, hitbox: { left: 2, right: 18, bottom: 0, top: 24 } });
        }
    }

    function createPtera() {
        const obsEl = document.createElement('div');
        obsEl.classList.add('obstacle', 'ptera');
        obsEl.style.left = '600px';
        const bottomPos = 30; 
        obsEl.style.bottom = bottomPos + 'px';
        obstaclesContainer.appendChild(obsEl);
        obstacles.push({ el: obsEl, x: 600, hitbox: { left: 4, right: 20, bottom: bottomPos, top: bottomPos + 12 } });
    }

    function endGame() {
        isPlaying = false;
        clearInterval(scoreInterval);
        clearInterval(gameLoopInterval);
        dino.className = 'stand'; // 게임오버 시에는 기본 서 있는 자세로 고정
        if (score > hiScore) { hiScore = score; hiScoreDisplay.innerText = 'HI ' + String(hiScore).padStart(5, '0'); }
        msgGameover.style.display = 'flex';
    }
</script>

</body>
</html>
