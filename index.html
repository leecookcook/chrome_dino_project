<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크롬 스타일 브라키오 게임 - 최종본</title>
    <style>
        /* 기본 스타일 및 낮/밤 테마 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }

        :root { --bg-color: #f7f7f7; --main-color: #535353; --sub-color: #747474; }
        body.night-mode { --bg-color: #202124; --main-color: #e8eaed; --sub-color: #9aa0a6; }

        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none; transition: background-color 0.3s ease; }
        #game { position: relative; width: 600px; height: 150px; background-color: var(--bg-color); overflow: hidden; border-bottom: 2px solid var(--main-color); transition: background-color 0.3s ease, border-color 0.3s ease; }

        /* 점수 영역 */
        #score-area { position: absolute; top: 10px; right: 10px; color: var(--main-color); font-size: 18px; font-weight: bold; z-index: 10; }
        #hi-score { margin-right: 15px; color: var(--sub-color); }

        /* 배경 구름 */
        .cloud { position: absolute; width: 4px; height: 4px; background: transparent; box-shadow: 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 4px 4px 0 var(--main-color), 8px 4px 0 var(--main-color), 12px 4px 0 var(--main-color), 16px 4px 0 var(--main-color), 20px 4px 0 var(--main-color), 24px 4px 0 var(--main-color), 28px 4px 0 var(--main-color), 0px 8px 0 var(--main-color), 4px 8px 0 var(--main-color), 8px 8px 0 var(--main-color), 12px 8px 0 var(--main-color), 16px 8px 0 var(--main-color), 20px 8px 0 var(--main-color), 24px 8px 0 var(--main-color), 8px 12px 0 var(--main-color), 12px 12px 0 var(--main-color); opacity: 0.6; z-index: 1; }

        /* 공룡 공통 베이스 */
        #dino { position: absolute; left: 40px; bottom: 2px; width: 4px; height: 4px; background: transparent; z-index: 5; }

        /* [수정 5] 공룡 기본 및 달리기 (서 있는 상태) 애니메이션 픽셀 아트 */
        #dino.stand-a { box-shadow: 36px -32px 0 var(--main-color), 40px -32px 0 var(--main-color), 44px -32px 0 var(--main-color), 36px -28px 0 var(--main-color), 40px -28px 0 var(--main-color), 36px -24px 0 var(--main-color), 36px -20px 0 var(--main-color), 32px -16px 0 var(--main-color), 36px -16px 0 var(--main-color), 28px -12px 0 var(--main-color), 32px -12px 0 var(--main-color), 12px -8px 0 var(--main-color), 16px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 24px -8px 0 var(--main-color), 28px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 12px -4px 0 var(--main-color), 16px -4px 0 var(--main-color), 20px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 28px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 8px 0px 0 var(--main-color), 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 24px 0px 0 var(--main-color), 8px 4px 0 var(--main-color); }
        #dino.stand-b { box-shadow: 36px -32px 0 var(--main-color), 40px -32px 0 var(--main-color), 44px -32px 0 var(--main-color), 36px -28px 0 var(--main-color), 40px -28px 0 var(--main-color), 36px -24px 0 var(--main-color), 36px -20px 0 var(--main-color), 32px -16px 0 var(--main-color), 36px -16px 0 var(--main-color), 28px -12px 0 var(--main-color), 32px -12px 0 var(--main-color), 12px -8px 0 var(--main-color), 16px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 24px -8px 0 var(--main-color), 28px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 12px -4px 0 var(--main-color), 16px -4px 0 var(--main-color), 20px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 28px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 8px 0px 0 var(--main-color), 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 24px 0px 0 var(--main-color), 24px 4px 0 var(--main-color); }

        /* [수정 4, 5] 공룡 고개 숙이기 및 숙여서 달리기 애니메이션 픽셀 아트 */
        #dino.duck-a { box-shadow: 12px -8px 0 var(--main-color), 16px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 24px -8px 0 var(--main-color), 28px -8px 0 var(--main-color), 32px -8px 0 var(--main-color), 36px -8px 0 var(--main-color), 40px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 12px -4px 0 var(--main-color), 16px -4px 0 var(--main-color), 20px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 28px -4px 0 var(--main-color), 32px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 8px 0px 0 var(--main-color), 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 24px 0px 0 var(--main-color), 28px 0px 0 var(--main-color), 8px 4px 0 var(--main-color); }
        #dino.duck-b { box-shadow: 12px -8px 0 var(--main-color), 16px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 24px -8px 0 var(--main-color), 28px -8px 0 var(--main-color), 32px -8px 0 var(--main-color), 36px -8px 0 var(--main-color), 40px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 12px -4px 0 var(--main-color), 16px -4px 0 var(--main-color), 20px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 28px -4px 0 var(--main-color), 32px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 8px 0px 0 var(--main-color), 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 24px 0px 0 var(--main-color), 28px 0px 0 var(--main-color), 24px 4px 0 var(--main-color); }

        /* 장애물 구조 */
        .obstacle { position: absolute; background: transparent; z-index: 4; }
        .cactus { bottom: 2px; width: 4px; height: 4px; box-shadow: 8px -24px 0 var(--main-color), 8px -20px 0 var(--main-color), 0px -16px 0 var(--main-color), 8px -16px 0 var(--main-color), 16px -16px 0 var(--main-color), 0px -12px 0 var(--main-color), 8px -12px 0 var(--main-color), 16px -12px 0 var(--main-color), 0px -8px 0 var(--main-color), 8px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 8px 0px 0 var(--main-color); }
        
        /* [수정 4] 프테라노돈 밤 전용 픽셀 아트 */
        .ptera { width: 4px; height: 4px; box-shadow: 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 8px 4px 0 var(--main-color), 12px 4px 0 var(--main-color), 16px 4px 0 var(--main-color), 20px 4px 0 var(--main-color), 24px 4px 0 var(--main-color), 0px 8px 0 var(--main-color), 4px 8px 0 var(--main-color), 8px 8px 0 var(--main-color), 12px 8px 0 var(--main-color), 16px 8px 0 var(--main-color), 20px 8px 0 var(--main-color), 8px 12px 0 var(--main-color), 12px 12px 0 var(--main-color), 16px 12px 0 var(--main-color); }

        /* 안내 문구 오버레이 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--main-color); font-size: 16px; font-weight: bold; background-color: var(--bg-color); z-index: 20; text-align: center; }
        .msg-gameover { display: none; }
        .gameover-text { font-size: 24px; letter-spacing: 5px; margin-bottom: 10px; }
        .restart-text { font-size: 14px; color: var(--sub-color); }
    </style>
</head>
<body>

<div id="game">
    <div id="clouds"></div>
    <div id="score-area">
        <span id="hi-score">HI 00000</span>
        <span id="score">00000</span>
    </div>
    <div id="dino" class="stand-a"></div>
    <div id="obstacles"></div>
    <div class="overlay msg-start" id="msg-start">
        <p>Space / ↑: 점프, ↓: 숙이기</p>
        <p style="font-size: 12px; margin-top: 5px; color: #747474;">(시작하려면 Space 또는 ↑ 키 입력)</p>
    </div>
    <div class="overlay msg-gameover" id="msg-gameover">
        <p class="gameover-text">GAME OVER</p>
        <p class="restart-text">Space / ↑ 키로 재시작</p>
    </div>
</div>

<script>
    const body = document.body;
    const dino = document.getElementById('dino');
    const scoreDisplay = document.getElementById('score');
    const hiScoreDisplay = document.getElementById('hi-score');
    const obstaclesContainer = document.getElementById('obstacles');
    const cloudsContainer = document.getElementById('clouds');
    const msgStart = document.getElementById('msg-start');
    const msgGameover = document.getElementById('msg-gameover');

    // 게임 설정 상태
    let isPlaying = false;
    let score = 0;
    let hiScore = 0;
    let scoreInterval;
    let gameLoopInterval;
    let isNight = false;
    
    // 물리 변수
    let isJumping = false;
    let isDucking = false; 
    let dinoY = 0;
    let jumpVelocity = 0;
    const gravity = 0.6; 

    // 오브젝트 변수
    let obstacles = [];
    let clouds = [];
    let obstacleSpeed = 4; // 기본 속도
    const cloudSpeed = 1; 
    let nextSpawnDistance = 300; // 첫 장애물 스폰 지점 임의 설정

    // 애니메이션 프레임 제어
    let animTimer = 0;
    let currentFrame = 'a';

    // 키보드 이벤트 핸들러
    window.addEventListener('keydown', function(e) {
        if (!isPlaying) {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                startGame();
            }
            return;
        }

        if (e.code === 'Space' || e.code === 'ArrowUp') {
            e.preventDefault(); 
            if (!isJumping && !isDucking) { 
                isJumping = true;
                jumpVelocity = 10;
            }
        } else if (e.code === 'ArrowDown') {
            e.preventDefault();
            if (!isJumping) { 
                isDucking = true;
            }
        }
    });

    window.addEventListener('keyup', function(e) {
        if (e.code === 'ArrowDown') {
            e.preventDefault();
            isDucking = false;
        }
    });

    // 게임 시작
    function startGame() {
        isPlaying = true;
        score = 0;
        dinoY = 0;
        isJumping = false;
        isDucking = false; 
        jumpVelocity = 0;
        obstacles = [];
        clouds = [];
        isNight = false;
        obstacleSpeed = 4; 
        nextSpawnDistance = 200; // 첫 간격 세팅

        obstaclesContainer.innerHTML = '';
        cloudsContainer.innerHTML = '';
        body.classList.remove('night-mode');
        msgStart.style.display = 'none';
        msgGameover.style.display = 'none';
        scoreDisplay.innerText = '00000';

        // [수정 1] 점수가 0.05초(50ms)에 1씩 증가하는 타이머
        clearInterval(scoreInterval);
        scoreInterval = setInterval(() => {
            if (!isPlaying) return;
            score++;
            scoreDisplay.innerText = String(score).padStart(5, '0');

            // 600층 단위로 밤낮 교체 및 속도 증가
            if (score > 0 && score % 600 === 0) {
                toggleNightMode();
            }
        }, 50);

        // 메인 업데이트 루프 (60 FPS 기반)
        clearInterval(gameLoopInterval);
        gameLoopInterval = setInterval(updateGame, 1000 / 60);
    }

    // [수정 3] 밤낮 변환 및 이동 속도 2씩 증가 증가
    function toggleNightMode() {
        isNight = !isNight;
        if (isNight) {
            body.classList.add('night-mode');
        } else {
            body.classList.remove('night-mode');
        }
        obstacleSpeed += 2; // 속도가 2씩 영구 누적 가속
    }

    function updateGame() {
        if (!isPlaying) return;

        // --- 공룡 점프 역학 연산 ---
        if (isJumping) {
            dinoY += jumpVelocity;
            jumpVelocity -= gravity; 

            if (dinoY <= 0) {
                dinoY = 0;
                isJumping = false;
                jumpVelocity = 0;
            }
        }
        dino.style.bottom = (2 + dinoY) + 'px';

        // --- [수정 5] 공룡 다리 달리기 / 숙이기 애니메이션 텍스처 렌더링 ---
        animTimer++;
        if (animTimer > 6) { // 6프레임마다 발을 바꿈 (약 0.1초 간격)
            currentFrame = (currentFrame === 'a') ? 'b' : 'a';
            animTimer = 0;
        }

        // 클래스 부여 규칙 완벽 정립
        dino.className = ''; 
        if (isJumping) {
            dino.classList.add('stand-a'); // 공중에서는 발동작 고정
        } else if (isDucking) {
            dino.classList.add(currentFrame === 'a' ? 'duck-a' : 'duck-b'); // [수정 4] 숙인 채 달리기 구현
        } else {
            dino.classList.add(currentFrame === 'a' ? 'stand-a' : 'stand-b'); // 서서 달리기 구현
        }

        // --- 구름 이동 시스템 ---
        if (Math.random() < 0.005) createCloud();
        for (let i = clouds.length - 1; i >= 0; i--) {
            let cloud = clouds[i];
            cloud.x -= cloudSpeed;
            cloud.el.style.left = cloud.x + 'px';
            if (cloud.x < -40) { cloud.el.remove(); clouds.splice(i, 1); }
        }

        // --- [수정 2] 장애물 정밀 거리 측정 및 스폰 알고리즘 ---
        // 가장 마지막에 생성된 장애물의 위치를 기준으로 추적
        let lastObstacleX = 0;
        if (obstacles.length > 0) {
            lastObstacleX = obstacles[obstacles.length - 1].x;
        }

        // 마지막 장애물이 '설정된 안전 거리'만큼 안으로 밀려 들어왔을 때만 다음 새 장애물을 던짐
        if (obstacles.length === 0 || lastObstacleX < (600 - nextSpawnDistance)) {
            
            // [수정 4] 프테라노돈은 오직 밤에만 50% 확률로 등장하도록 제어
            if (isNight && Math.random() > 0.5) {
                createPtera();
            } else {
                // [수정 2] 선인장 1~2개 랜덤 선택 생성
                const count = Math.random() > 0.5 ? 1 : 2;
                createCactus(count);
            }

            // [수정 2] 다음 스폰될 장애물 간격을 공룡 크기(44px)의 2~5배 사이에서 완벽하게 랜덤화
            const dinoWidth = 44;
            const minDistance = dinoWidth * 2; // 88px
            const maxDistance = dinoWidth * 5; // 220px
            
            // 현재 이동 속도(가속도)에 맞게 밀리지 않도록 보정치를 적용한 정밀 거리 계산
            nextSpawnDistance = Math.random() * (maxDistance - minDistance) + minDistance + (obstacleSpeed * 10);
        }

        // --- 장애물 이동 및 충돌 처리 실시간 검사 ---
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.x -= obstacleSpeed;
            obs.el.style.left = obs.x + 'px';

            // 화면 왼쪽 밖으로 나가면 삭제
            if (obs.x < -60) { 
                obs.el.remove(); 
                obstacles.splice(i, 1); 
                continue; 
            }

            // --- 정교화된 히트박스 판정 수식 ---
            // 공룡 위치 상태에 따른 유연한 상자 크기 축소/확장
            let dinoLeft = 40 + (isDucking ? 4 : 12);
            let dinoRight = 40 + (isDucking ? 40 : 32);
            let dinoBottom = dinoY;
            let dinoTop = dinoY + (isDucking ? 8 : 16); // 숙이면 높이가 절반(8px) 이하로 무너짐

            let obsLeft = obs.x + obs.hitbox.left;
            let obsRight = obs.x + obs.hitbox.right;
            let obsBottom = obs.hitbox.bottom;
            let obsTop = obs.hitbox.top;

            // AABB 충돌 충족 조건 대입
            if (obsLeft < dinoRight && obsRight > dinoLeft && dinoBottom < obsTop && dinoTop > obsBottom) {
                endGame();
            }
        }
    }

    function createCloud() {
        const cloudEl = document.createElement('div');
        cloudEl.classList.add('cloud');
        cloudEl.style.left = '600px';
        cloudEl.style.top = (Math.random() * 60 + 20) + 'px'; 
        cloudsContainer.appendChild(cloudEl);
        clouds.push({ el: cloudEl, x: 600 });
    }

    // [수정 2] 선인장 다중 생성 빌더
    function createCactus(count) {
        for (let i = 0; i < count; i++) {
            const obsEl = document.createElement('div');
            obsEl.classList.add('obstacle', 'cactus');
            // 2개가 잡히면 앞뒤로 픽셀이 겹쳐서 기괴하게 생성되지 않도록 안전 연장 결합 간격(16px) 부여
            const currentX = 600 + (i * 16); 
            obsEl.style.left = currentX + 'px';
            obstaclesContainer.appendChild(obsEl);
            obstacles.push({ 
                el: obsEl, 
                x: currentX, 
                hitbox: { left: 2, right: 14, bottom: 0, top: 24 } 
            });
        }
    }

    // [수정 4] 프테라노돈 빌더
    function createPtera() {
        const obsEl = document.createElement('div');
        obsEl.classList.add('obstacle', 'ptera');
        obsEl.style.left = '600px';
        
        // 브라키오가 서 있으면 무조건 부딪히고, 숙여야만 통과되는 공중 절묘한 타점 높이 설정 (30px)
        const flyHeight = 28; 
        obsEl.style.bottom = flyHeight + 'px';
        obstaclesContainer.appendChild(obsEl);
        obstacles.push({ 
            el: obsEl, 
            x: 600, 
            hitbox: { left: 4, right: 20, bottom: flyHeight, top: flyHeight + 12 } 
        });
    }

    function endGame() {
        isPlaying = false;
        clearInterval(scoreInterval);
        clearInterval(gameLoopInterval);
        dino.className = 'stand-a'; // 죽으면 제자리 정지 모습
        if (score > hiScore) { hiScore = score; hiScoreDisplay.innerText = 'HI ' + String(hiScore).padStart(5, '0'); }
        msgGameover.style.display = 'flex';
    }
</script>

</body>
</html>
