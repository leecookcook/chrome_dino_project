<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>크롬 스타일 브라키오 게임 - 다리 자연스럽게</title>
    <style>
        /* 기본 스타일 및 낮/밤 테마 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }

        :root { --bg-color: #f7f7f7; --main-color: #535353; --sub-color: #747474; }
        body.night-mode { --bg-color: #202124; --main-color: #e8eaed; --sub-color: #9aa0a6; }

        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none; transition: background-color 0.3s ease; }
        #game { position: relative; width: 600px; height: 150px; background-color: var(--bg-color); overflow: hidden; border-bottom: 2px solid var(--main-color); transition: background-color 0.3s ease, border-color 0.3s ease; }

        /* 점수 영역 */
        #score-area { position: absolute; top: 10px; right: 10px; color: var(--main-color); font-size: 18px; font-weight: bold; z-index: 10; }
        #hi-score { margin-right: 15px; color: var(--sub-color); }

        /* 배경 구름 */
        .cloud { position: absolute; width: 4px; height: 4px; background: transparent; box-shadow: 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 4px 4px 0 var(--main-color), 8px 4px 0 var(--main-color), 12px 4px 0 var(--main-color), 16px 4px 0 var(--main-color), 20px 4px 0 var(--main-color), 24px 4px 0 var(--main-color), 28px 4px 0 var(--main-color), 0px 8px 0 var(--main-color), 4px 8px 0 var(--main-color), 8px 8px 0 var(--main-color), 12px 8px 0 var(--main-color), 16px 8px 0 var(--main-color), 20px 8px 0 var(--main-color), 24px 8px 0 var(--main-color), 8px 12px 0 var(--main-color), 12px 12px 0 var(--main-color); opacity: 0.6; z-index: 1; }

        /* 공룡 공통 베이스 */
        #dino { position: absolute; left: 40px; bottom: 2px; width: 4px; height: 4px; background: transparent; z-index: 5; }

        /* [수정사항] 양 다리가 항상 있고 위지만 양옆으로 교차하는 달리기 픽셀 아트 */
        
        /* 서서 달리기 프레임 A (왼발 앞, 오른발 뒤) */
        #dino.stand-a { box-shadow: 36px -32px 0 var(--main-color), 40px -32px 0 var(--main-color), 44px -32px 0 var(--main-color), 36px -28px 0 var(--main-color), 40px -28px 0 var(--main-color), 36px -24px 0 var(--main-color), 36px -20px 0 var(--main-color), 32px -16px 0 var(--main-color), 36px -16px 0 var(--main-color), 28px -12px 0 var(--main-color), 32px -12px 0 var(--main-color), 12px -8px 0 var(--main-color), 16px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 24px -8px 0 var(--main-color), 28px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 12px -4px 0 var(--main-color), 16px -4px 0 var(--main-color), 20px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 28px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 8px 0px 0 var(--main-color), 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 24px 0px 0 var(--main-color), 8px 4px 0 var(--main-color), 24px 4px 0 var(--main-color); }
        /* 서서 달리기 프레임 B (왼발 뒤, 오른발 앞 - 양 다리 좌표 수정) */
        #dino.stand-b { box-shadow: 36px -32px 0 var(--main-color), 40px -32px 0 var(--main-color), 44px -32px 0 var(--main-color), 36px -28px 0 var(--main-color), 40px -28px 0 var(--main-color), 36px -24px 0 var(--main-color), 36px -20px 0 var(--main-color), 32px -16px 0 var(--main-color), 36px -16px 0 var(--main-color), 28px -12px 0 var(--main-color), 32px -12px 0 var(--main-color), 12px -8px 0 var(--main-color), 16px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 24px -8px 0 var(--main-color), 28px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 12px -4px 0 var(--main-color), 16px -4px 0 var(--main-color), 20px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 28px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 8px 0px 0 var(--main-color), 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 24px 0px 0 var(--main-color), 12px 4px 0 var(--main-color), 20px 4px 0 var(--main-color); }

        /* 숙여서 달리기 프레임 A (왼발 앞, 오른발 뒤) */
        #dino.duck-a { box-shadow: 12px -8px 0 var(--main-color), 16px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 24px -8px 0 var(--main-color), 28px -8px 0 var(--main-color), 32px -8px 0 var(--main-color), 36px -8px 0 var(--main-color), 40px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 12px -4px 0 var(--main-color), 16px -4px 0 var(--main-color), 20px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 28px -4px 0 var(--main-color), 32px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 8px 0px 0 var(--main-color), 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 24px 0px 0 var(--main-color), 28px 0px 0 var(--main-color), 8px 4px 0 var(--main-color), 24px 4px 0 var(--main-color); }
        /* 숙여서 달리기 프레임 B (왼발 뒤, 오른발 앞 - 양 다리 좌표 수정) */
        #dino.duck-b { box-shadow: 12px -8px 0 var(--main-color), 16px -8px 0 var(--main-color), 20px -8px 0 var(--main-color), 24px -8px 0 var(--main-color), 28px -8px 0 var(--main-color), 32px -8px 0 var(--main-color), 36px -8px 0 var(--main-color), 40px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 12px -4px 0 var(--main-color), 16px -4px 0 var(--main-color), 20px -4px 0 var(--main-color), 24px -4px 0 var(--main-color), 28px -4px 0 var(--main-color), 32px -4px 0 var(--main-color), 4px 0px 0 var(--main-color), 8px 0px 0 var(--main-color), 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 24px 0px 0 var(--main-color), 28px 0px 0 var(--main-color), 12px 4px 0 var(--main-color), 20px 4px 0 var(--main-color); }

        /* 장애물 구조 */
        .obstacle { position: absolute; background: transparent; z-index: 4; }
        .cactus { bottom: 2px; width: 4px; height: 4px; box-shadow: 8px -24px 0 var(--main-color), 8px -20px 0 var(--main-color), 0px -16px 0 var(--main-color), 8px -16px 0 var(--main-color), 16px -16px 0 var(--main-color), 0px -12px 0 var(--main-color), 8px -12px 0 var(--main-color), 16px -12px 0 var(--main-color), 0px -8px 0 var(--main-color), 8px -8px 0 var(--main-color), 8px -4px 0 var(--main-color), 8px 0px 0 var(--main-color); }
        .ptera { width: 4px; height: 4px; box-shadow: 12px 0px 0 var(--main-color), 16px 0px 0 var(--main-color), 20px 0px 0 var(--main-color), 8px 4px 0 var(--main-color), 12px 4px 0 var(--main-color), 16px 4px 0 var(--main-color), 20px 4px 0 var(--main-color), 24px 4px 0 var(--main-color), 0px 8px 0 var(--main-color), 4px 8px 0 var(--main-color), 8px 8px 0 var(--main-color), 12px 8px 0 var(--main-color), 16px 8px 0 var(--main-color), 20px 8px 0 var(--main-color), 8px 12px 0 var(--main-color), 12px 12px 0 var(--main-color), 16px 12px 0 var(--main-color); }

        /* 안내 문구 오버레이 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--main-color); font-size: 16px; font-weight: bold; background-color: var(--bg-color); z-index: 20; text-align: center; }
        .msg-gameover { display: none; }
        .gameover-text { font-size: 24px; letter-spacing: 5px; margin-bottom: 10px; }
        .restart-text { font-size: 14px; color: var(--sub-color); }
    </style>
</head>
<body>

<div id="game">
    <div id="clouds"></div>
    <div id="score-area">
        <span id="hi-score">HI 00000</span>
        <span id="score">00000</span>
    </div>
    <div id="dino" class="stand-a"></div>
    <div id="obstacles"></div>
    <div class="overlay msg-start" id="msg-start">
        <p>Space / ↑: 점프, ↓: 숙이기</p>
        <p style="font-size: 12px; margin-top: 5px; color: #747474;">(시작하려면 Space 또는 ↑ 키 입력)</p>
    </div>
    <div class="overlay msg-gameover" id="msg-gameover">
        <p class="gameover-text">GAME OVER</p>
        <p class="restart-text">Space / ↑ 키로 재시작</p>
    </div>
</div>

<script>
    const body = document.body;
    const dino = document.getElementById('dino');
    const scoreDisplay = document.getElementById('score');
    const hiScoreDisplay = document.getElementById('hi-score');
    const obstaclesContainer = document.getElementById('obstacles');
    const cloudsContainer = document.getElementById('clouds');
    const msgStart = document.getElementById('msg-start');
    const msgGameover = document.getElementById('msg-gameover');

    let isPlaying = false;
    let score = 0;
    let hiScore = 0;
    let scoreInterval;
    let gameLoopInterval;
    let isNight = false;
    
    let isJumping = false;
    let isDucking = false; 
    let dinoY = 0;
    let jumpVelocity = 0;
    const gravity = 0.6; 

    let obstacles = [];
    let clouds = [];
    let obstacleSpeed = 4; 
    const cloudSpeed = 1; 
    let nextSpawnDistance = 300; 

    let animTimer = 0;
    let currentFrame = 'a';

    // 키보드 이벤트 핸들러
    window.addEventListener('keydown', function(e) {
        if (!isPlaying) {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                startGame();
            }
            return;
        }

        if (e.code === 'Space' || e.code === 'ArrowUp') {
            e.preventDefault(); 
            if (!isJumping && !isDucking) { 
                isJumping = true;
                jumpVelocity = 10;
            }
        } else if (e.code === 'ArrowDown') {
            e.preventDefault();
            if (!isJumping) { 
                isDucking = true;
            }
        }
    });

    window.addEventListener('keyup', function(e) {
        if (e.code === 'ArrowDown') {
            e.preventDefault();
            isDucking = false;
        }
    });

    function startGame() {
        isPlaying = true;
        score = 0;
        dinoY = 0;
        isJumping = false;
        isDucking = false; 
        jumpVelocity = 0;
        obstacles = [];
        clouds = [];
        isNight = false;
        obstacleSpeed = 4; 
        nextSpawnDistance = 200; 

        obstaclesContainer.innerHTML = '';
        cloudsContainer.innerHTML = '';
        body.classList.remove('night-mode');
        msgStart.style.display = 'none';
        msgGameover.style.display = 'none';
        scoreDisplay.innerText = '00000';

        // 0.05초에 1씩 증가하는 점수 타이머
        clearInterval(scoreInterval);
        scoreInterval = setInterval(() => {
            if (!isPlaying) return;
            score++;
            scoreDisplay.innerText = String(score).padStart(5, '0');

            if (score > 0 && score % 600 === 0) {
                toggleNightMode();
            }
        }, 50);

        clearInterval(gameLoopInterval);
        gameLoopInterval = setInterval(updateGame, 1000 / 60);
    }

    function toggleNightMode() {
        isNight = !isNight;
        if (isNight) body.classList.add('night-mode');
        else body.classList.remove('night-mode');
        obstacleSpeed += 2; 
    }

    function updateGame() {
        if (!isPlaying) return;

        // 공룡 점프 연산
        if (isJumping) {
            dinoY += jumpVelocity;
            jumpVelocity -= gravity; 

            if (dinoY <= 0) {
                dinoY = 0;
                isJumping = false;
                jumpVelocity = 0;
            }
        }
        dino.style.bottom = (2 + dinoY) + 'px';

        // 애니메이션 프레임 제어
        animTimer++;
        if (animTimer > 6) { 
            currentFrame = (currentFrame === 'a') ? 'b' : 'a';
            animTimer = 0;
        }

        // 상태별 클래스 부여
        dino.className = ''; 
        if (isJumping) {
            dino.classList.add('stand-a'); 
        } else if (isDucking) {
            dino.classList.add(currentFrame === 'a' ? 'duck-a' : 'duck-b'); 
        } else {
            dino.classList.add(currentFrame === 'a' ? 'stand-a' : 'stand-b'); 
        }

        // 구름 이동
        if (Math.random() < 0.005) createCloud();
        for (let i = clouds.length - 1; i >= 0; i--) {
            let cloud = clouds[i];
            cloud.x -= cloudSpeed;
            cloud.el.style.left = cloud.x + 'px';
            if (cloud.x < -40) { cloud.el.remove(); clouds.splice(i, 1); }
        }

        // 장애물 스폰 알고리즘 (2~5배 무작위 간격)
        let lastObstacleX = 0;
        if (obstacles.length > 0) {
            lastObstacleX = obstacles[obstacles.length - 1].x;
        }

        if (obstacles.length === 0 || lastObstacleX < (600 - nextSpawnDistance)) {
            if (isNight && Math.random() > 0.5) {
                createPtera();
            } else {
                const count = Math.random() > 0.5 ? 1 : 2;
                createCactus(count);
            }

            const dinoWidth = 44;
            const minDistance = dinoWidth * 2; 
            const maxDistance = dinoWidth * 5; 
            nextSpawnDistance = Math.random() * (maxDistance - minDistance) + minDistance + (obstacleSpeed * 10);
        }

        // 장애물 이동 및 충돌 처리
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.x -= obstacleSpeed;
            obs.el.style.left = obs.x + 'px';

            if (obs.x < -60) { obs.el.remove(); obstacles.splice(i, 1); continue; }

            let dinoLeft = 40 + (isDucking ? 4 : 12);
            let dinoRight = 40 + (isDucking ? 40 : 32);
            let dinoBottom = dinoY;
            let dinoTop = dinoY + (isDucking ? 8 : 16);

            let obsLeft = obs.x + obs.hitbox.left;
            let obsRight = obs.x + obs.hitbox.right;
            let obsBottom = obs.hitbox.bottom;
            let obsTop = obs.hitbox.top;

            if (obsLeft < dinoRight && obsRight > dinoLeft && dinoBottom < obsTop && dinoTop > obsBottom) {
                endGame();
            }
        }
    }

    function createCloud() {
        const cloudEl = document.createElement('div');
        cloudEl.classList.add('cloud');
        cloudEl.style.left = '600px';
        cloudEl.style.top = (Math.random() * 60 + 20) + 'px'; 
        cloudsContainer.appendChild(cloudEl);
        clouds.push({ el: cloudEl, x: 600 });
    }

    function createCactus(count) {
        for (let i = 0; i < count; i++) {
            const obsEl = document.createElement('div');
            obsEl.classList.add('obstacle', 'cactus');
            const currentX = 600 + (i * 16); 
            obsEl.style.left = currentX + 'px';
            obstaclesContainer.appendChild(obsEl);
            obstacles.push({ el: obsEl, x: currentX, hitbox: { left: 2, right: 14, bottom: 0, top: 24 } });
        }
    }

    function createPtera() {
        const obsEl = document.createElement('div');
        obsEl.classList.add('obstacle', 'ptera');
        obsEl.style.left = '600px';
        const flyHeight = 28; 
        obsEl.style.bottom = flyHeight + 'px';
        obstaclesContainer.appendChild(obsEl);
        obstacles.push({ el: obsEl, x: 600, hitbox: { left: 4, right: 20, bottom: flyHeight, top: flyHeight + 12 } });
    }

    function endGame() {
        isPlaying = false;
        clearInterval(scoreInterval);
        clearInterval(gameLoopInterval);
        dino.className = 'stand-a'; 
        if (score > hiScore) { hiScore = score; hiScoreDisplay.innerText = 'HI ' + String(hiScore).padStart(5, '0'); }
        msgGameover.style.display = 'flex';
    }
</script>

</body>
</html>
