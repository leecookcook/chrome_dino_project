<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크롬 스타일 브라키오 게임</title>
    <style>
        /* 기본 흑백 및 픽셀 스타일 세팅 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game {
            position: relative;
            width: 600px;
            height: 150px;
            background-color: #f7f7f7;
            overflow: hidden;
            border-bottom: 2px solid #535353; /* 지면선 */
        }

        /* 점수 영역 */
        #score-area {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #535353;
            font-size: 18px;
            font-weight: bold;
            z-index: 10;
        }
        #hi-score {
            margin-right: 15px;
            color: #747474;
        }

        /* 픽셀 브라키오사우르스 (CSS 그림자로 픽셀 표현) */
        #dino {
            position: absolute;
            left: 40px;
            bottom: 0px; /* 지면 바로 위 */
            width: 4px;
            height: 4px;
            background: transparent;
            /* 브라키오사우르스 픽셀 아트 데이터 (흑백) */
            box-shadow: 
                /* 목과 머리 */
                36px -32px 0 #535353, 40px -32px 0 #535353, 44px -32px 0 #535353,
                36px -28px 0 #535353, 40px -28px 0 #535353,
                36px -24px 0 #535353,
                36px -20px 0 #535353,
                32px -16px 0 #535353, 36px -16px 0 #535353,
                28px -12px 0 #535353, 32px -12px 0 #535353,
                /* 몸통 */
                12px -8px 0 #535353, 16px -8px 0 #535353, 20px -8px 0 #535353, 24px -8px 0 #535353, 28px -8px 0 #535353,
                8px -4px 0 #535353, 12px -4px 0 #535353, 16px -4px 0 #535353, 20px -4px 0 #535353, 24px -4px 0 #535353, 28px -4px 0 #535353,
                4px 0px 0 #535353, 8px 0px 0 #535353, 12px 0px 0 #535353, 16px 0px 0 #535353, 20px 0px 0 #535353, 24px 0px 0 #535353,
                /* 다리 */
                8px 4px 0 #535353, 24px 4px 0 #535353;
            transition: bottom 0s;
        }

        /* 장애물 (픽셀 선인장) */
        .obstacle {
            position: absolute;
            bottom: 0px;
            width: 4px;
            height: 4px;
            background: transparent;
            /* 선인장 픽셀 아트 데이터 (흑백) */
            box-shadow:
                8px -24px 0 #535353,
                8px -20px 0 #535353,
                0px -16px 0 #535353, 8px -16px 0 #535353, 16px -16px 0 #535353,
                0px -12px 0 #535353, 8px -12px 0 #535353, 16px -12px 0 #535353,
                0px -8px 0 #535353, 8px -8px 0 #535353,
                8px -4px 0 #535353,
                8px 0px 0 #535353;
        }

        /* 안내 문구 오버레이 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #535353;
            font-size: 16px;
            font-weight: bold;
            background-color: rgba(247, 247, 247, 0.8);
        }

        .msg-gameover {
            display: none;
        }

        .gameover-text {
            font-size: 24px;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .restart-text {
            font-size: 14px;
            color: #747474;
        }
    </style>
</head>
<body>

<div id="game">
    <div id="score-area">
        <span id="hi-score">HI 00000</span>
        <span id="score">00000</span>
    </div>

    <div id="dino"></div>

    <div id="obstacles"></div>

    <div class="overlay msg-start" id="msg-start">
        <p>Space / ↑ 키로 시작</p>
    </div>

    <div class="overlay msg-gameover" id="msg-gameover">
        <p class="gameover-text">GAME OVER</p>
        <p class="restart-text">Space / ↑ 키로 재시작</p>
    </div>
</div>

<script>
    // 요소 가져오기
    const dino = document.getElementById('dino');
    const scoreDisplay = document.getElementById('score');
    const hiScoreDisplay = document.getElementById('hi-score');
    const obstaclesContainer = document.getElementById('obstacles');
    const msgStart = document.getElementById('msg-start');
    const msgGameover = document.getElementById('msg-gameover');

    // 게임 상태 변수
    let isPlaying = false;
    let score = 0;
    let hiScore = 0;
    let scoreInterval;
    let gameLoopInterval;
    
    // 공룡 점수 및 물리 변수
    let isJumping = false;
    let dinoY = 0;
    let jumpVelocity = 0;
    const gravity = 0.6; // 중력 강도

    // 장애물 변수
    let obstacles = [];
    let obstacleSpeed = 4; // 선인장이 다가오는 현실적인 기본 속도
    let spawnTimer = 0;

    // 키보드 입력 처리
    window.addEventListener('keydown', function(e) {
        if (e.code === 'Space' || e.code === 'ArrowUp') {
            e.preventDefault(); // 브라우저 스크롤 방지
            
            if (!isPlaying) {
                // 게임이 끝나있거나 시작 전이면 재시작
                startGame();
            } else if (!isJumping) {
                // 게임 중이고 점프 중이 아니면 점프 시동
                isJumping = true;
                jumpVelocity = 9.5; // 점프 높이/힘 조절
            }
        }
    });

    // 게임 시작 함수
    function startGame() {
        isPlaying = true;
        score = 0;
        dinoY = 0;
        isJumping = false;
        jumpVelocity = 0;
        obstacles = [];
        obstaclesContainer.innerHTML = '';
        
        msgStart.style.display = 'none';
        msgGameover.style.style = 'none';
        msgGameover.style.display = 'none';

        // 1. 0.01초(10ms)마다 점수 1씩 증가시켰습니다.
        clearInterval(scoreInterval);
        scoreInterval = setInterval(() => {
            score++;
            scoreDisplay.innerText = String(score).padStart(5, '0');
        }, 10);

        // 2. 메인 게임 루프 (초당 60프레임 기준 환경)
        clearInterval(gameLoopInterval);
        gameLoopInterval = setInterval(updateGame, 1000 / 60);
    }

    // 매 프레임 업데이트 함수
    function updateGame() {
        // --- 공룡 점수 물리 연산 ---
        if (isJumping) {
            dinoY += jumpVelocity;
            jumpVelocity -= gravity; // 중력 적용

            if (dinoY <= 0) {
                dinoY = 0;
                isJumping = false;
                jumpVelocity = 0;
            }
        }
        dino.style.bottom = dinoY + 'px';

        // --- 장애물(선인장) 생성 관리 ---
        spawnTimer++;
        if (spawnTimer > Math.random() * 40 + 90) { // 생성 주기 랜덤화로 현실감 부여
            createObstacle();
            spawnTimer = 0;
        }

        // --- 장애물 이동 및 충돌 체크 ---
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.x -= obstacleSpeed;
            obs.el.style.left = obs.x + 'px';

            // 화면 왼쪽으로 나가면 제거
            if (obs.x < -20) {
                obs.el.remove();
                obstacles.splice(i, 1);
                continue;
            }

            // 히트박스 기반 충돌 감지 알고리즘 (픽셀 아트 크기 기준 계산)
            // 브라키오사우르스 가로 영역 대략 40px ~ 88px 사이 분포
            let dinoLeft = 40 + 4;
            let dinoRight = 40 + 44; 
            let dinoTop = dinoY + 36; // 머리 높이 고려

            let obsLeft = obs.x;
            let obsRight = obs.x + 20;
            let obsTop = 24; // 선인장 높이

            if (obsLeft < dinoRight && obsRight > dinoLeft && dinoY < obsTop) {
                endGame();
            }
        }
    }

    // 선인장 엘리먼트 생성
    function createObstacle() {
        const obsEl = document.createElement('div');
        obsEl.classList.add('obstacle');
        obsEl.style.left = '600px';
        obstaclesContainer.appendChild(obsEl);
        
        obstacles.push({
            el: obsEl,
            x: 600
        });
    }

    // 게임 오버 처리
    function endGame() {
        isPlaying = false;
        clearInterval(scoreInterval);
        clearInterval(gameLoopInterval);
        
        // 최고 점수 갱신
        if (score > hiScore) {
            hiScore = score;
            hiScoreDisplay.innerText = 'HI ' + String(hiScore).padStart(5, '0');
        }

        msgGameover.style.display = 'flex';
    }
</script>

</body>
</html>
